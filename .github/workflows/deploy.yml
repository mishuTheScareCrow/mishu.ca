# This is a basic workflow to help you get started with Actions

name: Build And Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push event but only for the "prod" branch
  push:
    branches: ["prod"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy mishu.ca
        uses: actions/checkout@v4
        with:
          host: ${{ secrets.MISH_HOST }}
          port: ${{ secrets.MISH_PORT }}
          username: ${{ secrets.MISH_USERNAME }}
          password: ${{ secrets.MISH_PASSWORD }}

          script: |
            cd ~/mishu/
            git pull
            cp .env.local .env.backup
            cp .env.mishu .env.local
            cp .env.mishu .env.test
            composer install
            bin/console doctrine:migrations:migrate --no-interaction
            bin/console cache:clear        
            echo "Deployment successful!"
