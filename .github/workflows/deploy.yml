# This is a basic workflow to help you get started with Actions

name: Build And Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push event but only for the "prod" branch
  push:
    branches: ["prod"]

jobs:
  build:
    name: 🕳️ Ubuntu...
    runs-on: ubuntu-latest
    steps:
      - name: 💞 Github actions...
        uses: actions/checkout@v3
      - name: 🌈 Deploy with ssh...
        uses: sebastianjnuwu/ssh-action-deploy@v3
        with:
          IP: ${{ secrets.MISH_HOST }}
          USER: ${{ secrets.MISH_USERNAME }}
          KEY: ${{ secrets.MISH_PASSWORD }}
          PORT: ${{ secrets.MISH_PORT }}
          FOLDER: "/mishu/"
